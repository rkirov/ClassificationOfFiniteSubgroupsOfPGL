name: Comparator verification

# Runs the full independent verification (pattern: rkirov/jacobian-claude):
# build the library, then verify.sh runs the official leanprover/comparator
# against comparator/Challenge.lean — statement match, permitted-axiom check
# (propext / Classical.choice / Quot.sound only), and independent kernel
# replay of the whole proof term via lean4export. Unlike the plain build CI
# (where `sorry` is only a warning), a sorry or axiom regression FAILS here.

on:
  push:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'comparator/**'
      - 'verify.sh'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/verify.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y \
            --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build library
        run: lake build

      - name: Cache comparator toolchain
        uses: actions/cache@v4
        with:
          path: ~/.cache/dickson-comparator
          key: dickson-comparator-${{ hashFiles('comparator/lean-toolchain') }}

      - name: Run comparator (statement match + axioms + kernel replay)
        run: ./verify.sh
